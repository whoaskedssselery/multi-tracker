name: multi_tracker
description: Personal multi-tracker — weight, workouts, tasks, AI insights.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Database (Drift / SQLite)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24

  # Routing
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Secure storage (Gemini key)
  flutter_secure_storage: ^9.2.4

  # HTTP / AI
  dio: ^5.8.0+1

  # Markdown (Notes)
  flutter_markdown: ^0.7.6+1

  # Export & file handling
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.3.7

  # Fonts
  google_fonts: ^6.2.1

  # Intl
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  generate: true
