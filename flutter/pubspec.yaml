name: multi_tracker
description: Personal multi-tracker — weight log, workouts (PPL), tasks, notes, AI chat (Groq).
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (Drift / SQLite)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24

  # Routing
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Secure storage (API key — iOS Keychain / Windows Credential Manager)
  flutter_secure_storage: ^9.2.4

  # HTTP / AI (Groq)
  dio: ^5.8.0+1

  # Cloud sync (Supabase — auth + Postgres)
  supabase_flutter: ^2.8.0

  # Export & file handling
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.1.4


  # Intl
  intl: ^0.20.2

  # Note: fonts (Inter + JetBrains Mono) are bundled locally under
  # assets/fonts and declared in the `flutter:` section below.
  # No runtime font fetching — works offline and identically on every platform.

# path_provider_android 2.3.x pulls jni_flutter (Java interop), whose Dart
# plugin registrant fails to compile on a clean Windows build
# ("JObject isn't a type"). We never build Android, so pin path_provider_android
# to the last pre-jni release to keep the Windows registrant clean.
dependency_overrides:
  path_provider_android: 2.2.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
  generate: true

  fonts:
    # Manrope — sans for all text. Variable font (wght axis only, no opsz),
    # so Flutter maps fontWeight → wght reliably.
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
    # IBM Plex Mono — numbers (weight, reps, %, dates, chart). Static weights.
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
