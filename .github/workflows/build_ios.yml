name: Build iOS App for AltStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: flutter-${{ runner.os }}-3.24.0

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
            .packages
            pubspec.lock
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (debug mode)
        run: |
          # Убираем Development Team из project.pbxproj
          sed -i '' 's/DevelopmentTeam = .*/DevelopmentTeam = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          
          # Билдим без подписи
          flutter build ios --debug --no-codesign
          
          # Пакуем IPA
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r App.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: build/ios/iphoneos/App.ipa
          retention-days: 7

      - name: Upload Runner.app (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-Files
          path: build/ios/iphoneos/Runner.app
          retention-days: 7