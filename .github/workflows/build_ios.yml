name: Build iOS App for AltStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # Build unsigned release app.
      # --no-codesign: Runner binary stays unsigned;
      # pre-built Flutter frameworks keep their SDK signatures.
      # AltStore re-signs everything with --force on install.
      - name: Build iOS release (unsigned)
        run: flutter build ios --release --no-codesign

      # Verify the built Info.plist is a valid plist before packaging.
      - name: Verify Info.plist
        run: |
          PLIST="build/ios/iphoneos/Runner.app/Info.plist"
          echo "=== Info.plist (human-readable) ==="
          plutil -p "$PLIST"
          echo ""
          echo "=== Runner.app top-level ==="
          ls -la build/ios/iphoneos/Runner.app/ | head -20

      # Package: Payload/Runner.app → App.ipa
      # No codesign --remove-signature — that command modifies files before
      # erroring on non-Mach-O inputs, which can corrupt Info.plist and
      # trigger NSCocoaErrorDomain 3840 in AltStore.
      - name: Package IPA
        run: |
          set -e
          cd build/ios/iphoneos
          rm -rf Payload
          mkdir Payload
          cp -R Runner.app Payload/
          zip -qr App.ipa Payload \
            -x "*.DS_Store" \
            -x "__MACOSX/*"
          echo "IPA size: $(du -sh App.ipa)"
          echo "IPA top entries:"
          unzip -l App.ipa | head -12

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: build/ios/iphoneos/App.ipa
          retention-days: 7
