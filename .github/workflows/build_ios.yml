name: Build iOS App for AltStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS release (unsigned)
        run: flutter build ios --release --no-codesign

      # Xcode compiles Info.plist to binary format.
      # AltServer on Windows uses its own plist parser which can fail on
      # binary plists (NSCocoaErrorDomain 3840). Convert to XML1 so that
      # every plist reader — macOS, Windows, iOS — can parse it without issues.
      - name: Convert Info.plist to XML (AltServer Windows compat)
        run: |
          APP="build/ios/iphoneos/Runner.app"
          PLIST="$APP/Info.plist"

          echo "=== Before conversion ==="
          file "$PLIST"

          plutil -convert xml1 "$PLIST"

          echo "=== After conversion ==="
          file "$PLIST"
          plutil -lint "$PLIST" && echo "✓ Info.plist valid"
          plutil -p "$PLIST"

          # Also convert any other binary plists inside the bundle
          find "$APP" -name "*.plist" | while read -r p; do
            if file "$p" | grep -q "binary"; then
              plutil -convert xml1 "$p" 2>/dev/null || true
              echo "converted: $p"
            fi
          done

      - name: Package IPA
        run: |
          set -e
          APP="build/ios/iphoneos/Runner.app"

          cd build/ios/iphoneos
          rm -rf Payload
          mkdir Payload
          # -R preserves symlinks inside frameworks
          cp -R Runner.app Payload/

          # -X: no extra macOS attributes (UID/GID/timestamps) in zip headers
          # This prevents AltServer from choking on macOS-specific zip extensions
          zip -r -X App.ipa Payload \
            -x "*.DS_Store" \
            -x "__MACOSX/*"

          echo "IPA size: $(du -sh App.ipa)"

          echo ""
          echo "=== IPA zip TOC (first 20 entries) ==="
          unzip -l App.ipa | head -22

          echo ""
          echo "=== Info.plist inside IPA ==="
          unzip -p App.ipa "Payload/Runner.app/Info.plist" | plutil -lint - && echo "✓ plist in IPA is valid"
          unzip -p App.ipa "Payload/Runner.app/Info.plist" | plutil -p -

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: build/ios/iphoneos/App.ipa
          retention-days: 7
