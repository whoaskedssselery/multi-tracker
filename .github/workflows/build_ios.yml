name: Build iOS App for AltStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # flutter build ipa --no-codesign requires xcodebuild -exportArchive which
      # fails in CI without a developer team/certificate. Instead we:
      #   1. Build the .app with flutter build ios (no export step needed)
      #   2. Strip ALL existing signatures — Flutter SDK pre-signs Flutter.framework,
      #      App.framework, objective_c.framework; leaving mixed-signed binaries
      #      (some signed, Runner unsigned) causes AltStore NSCocoaErrorDomain 3840
      #   3. Package manually: Payload/Runner.app → App.ipa
      - name: Build IPA for AltStore
        run: |
          set -e

          flutter build ios --release --no-codesign

          APP="build/ios/iphoneos/Runner.app"

          # Strip every existing code signature so AltStore re-signs the whole
          # bundle uniformly (no mixed-signed state).
          find "$APP" -type f | while IFS= read -r f; do
            codesign --remove-signature "$f" 2>/dev/null || true
          done

          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          rm -rf Payload
          mkdir Payload
          cp -R Runner.app Payload/
          zip -r -X "$GITHUB_WORKSPACE/build/ios/ipa/App.ipa" Payload \
            -x "*.DS_Store"
          echo "IPA: $(du -sh "$GITHUB_WORKSPACE/build/ios/ipa/App.ipa")"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: build/ios/ipa/App.ipa
          retention-days: 7
