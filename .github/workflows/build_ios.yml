name: Build iOS App for AltStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # RELEASE + no codesign — this is the combination AltStore needs.
      # (Debug builds use JIT and won't launch when sideloaded; they also
      #  produce a bundle AltStore can fail to read → NSCocoaErrorDomain 3840.)
      - name: Build iOS (release, unsigned)
        run: flutter build ios --release --no-codesign

      # AltStore requires a zip whose ROOT contains a `Payload/` folder with
      # the .app inside. Anything else → "data couldn't be read" (3840).
      - name: Package unsigned IPA
        run: |
          set -e
          cd build/ios/iphoneos
          rm -rf Payload App.ipa
          mkdir Payload
          cp -R Runner.app Payload/
          # -X strips macOS extended attributes / resource forks that can
          #  corrupt the archive for AltStore.
          zip -r -X App.ipa Payload -x "*.DS_Store"
          unzip -l App.ipa | head -20
          mkdir -p "$GITHUB_WORKSPACE/output"
          mv App.ipa "$GITHUB_WORKSPACE/output/App.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: output/App.ipa
          retention-days: 7
