name: Build iOS App for AltStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # flutter build ipa --no-codesign runs the full Xcode Archive + exportArchive
      # pipeline, which strips ALL existing code signatures (including those
      # pre-baked into Flutter.framework / App.framework) before packaging.
      # The old "flutter build ios + manual zip" left those frameworks signed by
      # Apple/Flutter while Runner and plugin binaries were unsigned — mixed
      # signing state causes AltStore to throw NSCocoaErrorDomain 3840.
      - name: Build IPA (release, unsigned — correct for AltStore)
        run: flutter build ipa --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: build/ios/ipa/*.ipa
          retention-days: 7
