name: Build iOS App for AltStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: flutter-${{ runner.os }}-3.24.0

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
            .packages
            pubspec.lock
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS without signing
        run: |
          cd ios
          
          # Чистим предыдущие сборки
          rm -rf ../build/ios
          
          # Запускаем pod install вручную
          pod install
          
          # Собираем через xcodebuild с отключённой подписью
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../build/ios \
            -archivePath ../build/ios/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            -allowProvisioningUpdates

      - name: Find and package IPA
        run: |
          # Ищем Runner.app в DerivedData
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build/ios -name "*.app" -type d
            exit 1
          fi
          
          cd "$(dirname "$APP_PATH")"
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r App.ipa Payload
          rm -rf Payload
          
          mkdir -p $GITHUB_WORKSPACE/output
          mv App.ipa $GITHUB_WORKSPACE/output/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: output/App.ipa
          retention-days: 7