<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '?').replace(/%2F/g, '/')
        + (l.search ? '&' + l.search.slice(1).replace(/&/g, '=') : '')
        + l.hash
      );
    </script>
  </head>
</html>
